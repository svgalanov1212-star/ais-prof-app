<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АИС.ПРОФ — Платформа строительной отрасли</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 40px 0;
            text-align: left;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .feature-icon { font-size: 32px; margin-bottom: 10px; }
        .feature-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .feature-text { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏗</div>
        <h1>АИС.ПРОФ</h1>
        <p>Профессиональная платформа для специалистов строительной отрасли России</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤝</div>
                <div class="feature-title">Нетворкинг</div>
                <div class="feature-text">Находи партнёров и клиентов</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💼</div>
                <div class="feature-title">Вакансии</div>
                <div class="feature-text">Актуальные предложения</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <div class="feature-title">База знаний</div>
                <div class="feature-text">СП, ГОСТы, экспертиза</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⭐</div>
                <div class="feature-title">PRO-зона</div>
                <div class="feature-text">Премиум для профи</div>
            </div>
        </div>

        <button class="btn" onclick="openBot()">🤖 Открыть бота</button>
        <button class="btn" onclick="openChannel()">📰 Канал АИС.ПРОФ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.setText('Начать регистрацию');
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({ action: 'start_registration' }));
        });

        function openBot() {
            tg.openTelegramLink('https://t.me/ais_prof_bot');
        }

        function openChannel() {
            tg.openTelegramLink('https://t.me/aisprof_ru');
        }
    </script>
</body>
</html>
